# Home Assistant Add-on Configuration
name: "IM Energy Tool"
description: "Energy management tool for Home Assistant with IM integration"
version: "0.0.5"
slug: "im-energy-tool"
url: "https://gitlab.informatik.uni-bremen.de/home-assistant/addon-im-energy-tool"
image: "gitlab.informatik.uni-bremen.de:5005/home-assistant/addon-im-energy-tool/{arch}"
init: false
arch:
  - amd64
  - aarch64
hassio_api: true
homeassistant_api: true
# Ingress-only: the Web UI is reached through Home Assistant's authenticated
# Ingress proxy (sidebar panel). We deliberately do NOT publish 9150 on the
# host: the API re-serves token-privileged HA data (location, entities, config)
# and has no auth of its own, so a raw published port would let anyone on the
# LAN read it. uvicorn still binds 0.0.0.0 inside the container; only the
# Supervisor's ingress proxy can reach it.
ingress: true
ingress_port: 9150
panel_icon: "mdi:chart-line"
map:
  - type: addon_config
    read_only: false
stage: experimental